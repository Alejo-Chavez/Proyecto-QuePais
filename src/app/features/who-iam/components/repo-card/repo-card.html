@if (repos) {

<div class="group p-6 bg-[#161B22] border border-[#30363d] rounded-xl 
            hover:border-slate-500 transition-all duration-200 
            flex flex-col justify-between h-full">

  <!-- HEADER -->
  <div>
    <div class="flex justify-between items-start mb-2">

      <!-- Nombre -->
      <div class="flex items-center gap-2 min-w-0 overflow-hidden">
        <span class="text-slate-400 self-start pt-1.5">
          <!-- icono -->
          <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
            <path
              d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Z" />
          </svg>
        </span>

        <a [href]="repos.html_url" target="_blank" class="text-[#2F81F7] font-semibold hover:underline line-clamp-2">
          {{ repos.name }}
        </a>
      </div>

      <!-- Badge -->
      <span class="px-2 py-0.5 rounded-full border border-[#30363d] 
                   text-xs text-slate-400">
        Public
      </span>
    </div>

    <!-- DESCRIPTION -->
    <p class="text-sm text-slate-400 mb-6 line-clamp-2">
      {{ repos.description || 'Sin descipción' }}
    </p>
  </div>

  <!-- FOOTER -->
  <div class="flex items-center justify-between mt-auto pt-4">

    <div class="flex items-center gap-4">

      <!-- LENGUAJE -->
      <div class="flex items-center gap-2">

        <!--  DINÁMICO -->
        <span class="w-3 h-3 rounded-full" [style.backgroundColor]="repos.color"></span>

        <span class="text-sm text-slate-400">
          {{ repos.language || 'Unknown' }}
        </span>
      </div>

      <!-- STARS -->
      <div class="flex items-center gap-1 leading-none text-slate-500">
        <span class="text-sm flex items-center gap-1.5"><svg class="octicon" fill="var(--primary)" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
            <path
              d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z">
            </path>
          </svg>{{repos.stargazers_count}}</span>
      </div>
    </div>
  </div>
</div>
}
